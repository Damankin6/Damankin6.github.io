<html>

<head>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <div id="header">
	<button class="twitch" onclick="window.location.href='https://www.twitch.tv/damanking'">Twitch</button>
	<button class="youtube" onclick="window.location.href='https://www.youtube.com/@damankingttv'">Youtube</button>
	<div id="clock"><script src="clock.js"></script></div>
  </div>
  <div id="page">
    <div id="content">
      <iframe allowfullscreen frameborder="0" src="https://www.youtube.com/embed/live_stream?channel=UCCEaaDpWeLAeloRXbK10kcA"></iframe>
    </div>
    <div id="sidebar">
      <div id="twitch-embed">
        <script src="https://embed.twitch.tv/embed/v1.js"></script>
        <script type="text/javascript">
          var embed = new Twitch.Embed("twitch-embed", {
            channel: "Damanking",
            layout: "video",
            autoplay: true,
            parent: ["Damankin6.github.io"]
          });
          embed.addEventListener(Twitch.Embed.VIDEO_READY, () => {
            var player = embed.getPlayer();
            player.setVolume(0.01);
            player.play();
            player.setQuality('160p')
          });
        </script>
      </div>
      <div id="chat">
        <iframe frameborder="0" src="https://www.twitch.tv/embed/Damanking/chat?darkpopout&parent=Damankin6.github.io"></iframe>
      </div>
    </div>
  </div>
</body>

</html>
